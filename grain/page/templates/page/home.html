{% extends "layouts/index.html" %}

{% block title %}GRAIN - Dashboard{% endblock %}

{% block body %}
  
  <div class="vstack gap-3">
    {% for item in items %}
    <div class="hstack gap-3 w-100 align-items-start">
      <div>
        <div class="avatar rounded-circle">
          <img src="https://assets.webpixels.io/img/memoji/memoji-10.svg" alt="..." />
        </div>
      </div>
      <div class="flex-fill">
        <div class="text-sm">
          <strong class="text-heading text-sm">You</strong> posted a new photo
        </div>
        <div class="d-flex align-items-center mb-2">
          <div>
            <span class="text-xs text-muted d-block">{{ item.last_modified.strftime('%H:%M %Y-%m-%d') }}</span>
          </div>
        </div>
        {% if item.text %}
          <p class="mb-2">{{ item.text }}</p>
        {% endif %}
        <div class="d-flex gap-2 mb-3">
          <div class="col-auto">
            <img src="{{ url_for('page.serve_image', filename=item.name) }}" class="rounded w-auto h-rem-20" alt="..." />
          </div>
        </div>
      </div>
    </div>
    {% endfor %}
  </div>
{% endblock %}
