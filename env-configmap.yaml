apiVersion: v1
data:
  COMPOSE_PROFILES: assets,web,worker
  COMPOSE_PROJECT_NAME: grain
  DOCKER_BUILDKIT: "1"
  DOCKER_RESTART_POLICY: "no"
  DOCKER_WEB_HEALTHCHECK_TEST: /bin/true
  DOCKER_WEB_PORT_FORWARD: "8000"
  DOCKER_WEB_VOLUME: .:/app
  FLASK_DEBUG: "true"
  MINIO_HOST: minio-api-default.apps.homelab.localdomain
  MINIO_ACCESS_KEY: miniosandbox
  MINIO_SECRET_KEY: miniosandbox
  MINIO_BUCKET: openshift-ai-pipeline
  NODE_ENV: development
  PYTHONDONTWRITEBYTECODE: "true"
  SECRET_KEY: insecure_key_for_dev
  WEB_RELOAD: "true"
kind: ConfigMap
metadata:
  labels:
    io.kompose.service: web-env
  name: env
